<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Facts Practice</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Math Practice">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 500px;
      padding: 30px;
      margin-top: 20px;
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 8px;
      font-size: 1.8rem;
    }
    
    .screen {
      display: none;
    }
    
    .screen.active {
      display: block;
    }
    
    /* Setup Screen */
    .form-group {
      margin-bottom: 8px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #444;
    }
    
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f5f5f5;
      padding: 8px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    
    .checkbox-item:hover {
      background: #eee;
    }
    
    .checkbox-item.selected {
      background: #667eea;
      color: white;
    }
    
    /* Theme overrides for selected checkboxes */
    body.theme-kpop .checkbox-item.selected { background: #e94560; }
    body.theme-mcqueen .checkbox-item.selected { background: #c41e3a; }
    body.theme-ocean .checkbox-item.selected { background: #0284c7; }
    body.theme-sunset .checkbox-item.selected { background: #ea580c; }
    body.theme-frozen .checkbox-item.selected { background: #0ea5e9; }
    body.theme-zootopia .checkbox-item.selected { background: #b45309; }
    
    .checkbox-item input {
      display: none;
    }
    
    .number-select {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    
    .number-btn {
      width: 50px;
      height: 50px;
      border: 2px solid #ddd;
      border-radius: 12px;
      background: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .number-btn:hover {
      border-color: #667eea;
    }
    
    .number-btn.selected {
      background: #667eea;
      border-color: #667eea;
      color: white;
    }
    
    .goal-input {
      width: 100%;
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 1.1rem;
      text-align: center;
    }
    
    .goal-input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn {
      width: 100%;
      padding: 15px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    
    .btn:hover {
      background: #5a6fd6;
      transform: translateY(-2px);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    /* Practice Screen */
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    
    .progress-text {
      text-align: center;
      color: #666;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    
    .streak-text {
      text-align: center;
      color: #f59e0b;
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 10px;
      min-height: 24px;
    }
    
    .milestone-badge {
      display: inline-block;
      background: #ffd700;
      color: #333;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
      margin-bottom: 8px;
      animation: bounce 0.5s ease;
    }
    
    @keyframes bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    
    /* Progress colors: red, orange, green, blue, purple */
    .progress-fill.color-1 { background: linear-gradient(90deg, #ef4444, #dc2626); }
    .progress-fill.color-2 { background: linear-gradient(90deg, #f59e0b, #d97706); }
    .progress-fill.color-3 { background: linear-gradient(90deg, #10b981, #059669); }
    .progress-fill.color-4 { background: linear-gradient(90deg, #3b82f6, #2563eb); }
    .progress-fill.color-5 { background: linear-gradient(90deg, #8b5cf6, #7c3aed); }
    
    /* Theme: K-pop Demon Hunter */
    body.theme-kpop {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    body.theme-kpop .container {
      background: linear-gradient(145deg, #1f1f3a, #2a2a4a);
      box-shadow: 0 20px 60px rgba(233, 69, 96, 0.3);
    }
    body.theme-kpop h1, body.theme-kpop label {
      color: #e94560;
    }
    body.theme-kpop .flashcard {
      background: linear-gradient(145deg, #2a2a4a, #1f1f3a);
      box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2);
    }
    body.theme-kpop .problem {
      color: #fff;
      text-shadow: 0 0 10px #e94560;
    }
    body.theme-kpop .answer-input {
      background: #1a1a2e;
      border-color: #e94560;
      color: #fff;
    }
    body.theme-kpop .btn {
      background: linear-gradient(90deg, #e94560, #ff6b6b);
    }
    body.theme-kpop .streak-text {
      color: #ffd700;
      text-shadow: 0 0 10px #ffd700;
    }
    
    /* Theme: Lightning McQueen */
    body.theme-mcqueen {
      background: linear-gradient(135deg, #c41e3a 0%, #ff6b35 50%, #ffc107 100%);
    }
    body.theme-mcqueen .container {
      background: linear-gradient(145deg, #fff, #f5f5f5);
      box-shadow: 0 20px 60px rgba(196, 30, 58, 0.4);
    }
    body.theme-mcqueen h1 {
      color: #c41e3a;
      text-shadow: 2px 2px 0 #ffc107;
    }
    body.theme-mcqueen .flashcard {
      background: linear-gradient(145deg, #fff, #f0f0f0);
      border: 3px solid #c41e3a;
    }
    body.theme-mcqueen .problem {
      color: #c41e3a;
      font-style: italic;
    }
    body.theme-mcqueen .answer-input {
      border-color: #c41e3a;
    }
    body.theme-mcqueen .btn {
      background: linear-gradient(90deg, #c41e3a, #ff6b35);
    }
    body.theme-mcqueen .streak-text {
      color: #ffc107;
    }
    
    /* Theme: Ocean */
    body.theme-ocean {
      background: linear-gradient(135deg, #0c1929 0%, #1e3a5f 50%, #2e5a88 100%);
    }
    body.theme-ocean .container {
      background: linear-gradient(145deg, #1a3a5c, #0f2840);
      box-shadow: 0 20px 60px rgba(56, 189, 248, 0.3);
    }
    body.theme-ocean h1, body.theme-ocean label {
      color: #38bdf8;
    }
    body.theme-ocean .flashcard {
      background: linear-gradient(145deg, #0f2840, #0a1f30);
      box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
    }
    body.theme-ocean .problem {
      color: #7dd3fc;
    }
    body.theme-ocean .answer-input {
      background: #0c1929;
      border-color: #38bdf8;
      color: #fff;
    }
    body.theme-ocean .btn {
      background: linear-gradient(90deg, #0284c7, #38bdf8);
    }
    
    /* Theme: Sunset */
    body.theme-sunset {
      background: linear-gradient(135deg, #7c2d12 0%, #c2410c 50%, #ea580c 100%);
    }
    body.theme-sunset .container {
      background: linear-gradient(145deg, #fff7ed, #ffedd5);
      box-shadow: 0 20px 60px rgba(234, 88, 12, 0.4);
    }
    body.theme-sunset h1 {
      color: #c2410c;
    }
    body.theme-sunset .flashcard {
      background: linear-gradient(145deg, #ffedd5, #fed7aa);
      box-shadow: 0 10px 30px rgba(234, 88, 12, 0.2);
    }
    body.theme-sunset .problem {
      color: #9a3412;
    }
    body.theme-sunset .answer-input {
      border-color: #ea580c;
    }
    body.theme-sunset .btn {
      background: linear-gradient(90deg, #c2410c, #f97316);
    }
    
    /* Theme: Frozen */
    body.theme-frozen {
      background: linear-gradient(135deg, #1e3a5f 0%, #60a5fa 50%, #a5f3fc 100%);
    }
    body.theme-frozen .container {
      background: linear-gradient(145deg, #e0f2fe, #f0f9ff);
      box-shadow: 0 20px 60px rgba(147, 197, 253, 0.5);
    }
    body.theme-frozen h1 {
      color: #0284c7;
    }
    body.theme-frozen .flashcard {
      background: linear-gradient(145deg, #fff, #e0f2fe);
      box-shadow: 0 10px 30px rgba(186, 230, 253, 0.5);
    }
    body.theme-frozen .problem {
      color: #0369a1;
    }
    body.theme-frozen .answer-input {
      border-color: #38bdf8;
      background: #f0f9ff;
    }
    body.theme-frozen .btn {
      background: linear-gradient(90deg, #0ea5e9, #7dd3fc);
    }
    
    /* Theme: Mario */
    body.theme-mario {
      background: linear-gradient(135deg, #1d4ed8 0%, #3b82f6 50%, #60a5fa 100%);
    }
    body.theme-mario .container {
      background: linear-gradient(145deg, #fef3c7, #fde68a);
      box-shadow: 0 20px 60px rgba(234, 179, 8, 0.4);
    }
    body.theme-mario h1 {
      color: #dc2626;
      text-shadow: 2px 2px 0 #fbbf24;
    }
    body.theme-mario .flashcard {
      background: linear-gradient(145deg, #fde047, #facc15);
      border: 4px solid #16a34a;
    }
    body.theme-mario .problem {
      color: #1d4ed8;
      font-weight: 900;
    }
    body.theme-mario .answer-input {
      border-color: #16a34a;
      background: #fff;
    }
    body.theme-mario .btn {
      background: linear-gradient(90deg, #dc2626, #fbbf24);
    }
    body.theme-mario .streak-text {
      color: #dc2626;
    }
    
    /* Theme: Zootopia */
    body.theme-zootopia {
      background: linear-gradient(135deg, #78350f 0%, #b45309 50%, #d97706 100%);
    }
    body.theme-zootopia .container {
      background: linear-gradient(145deg, #fef3c7, #fff7ed);
      box-shadow: 0 20px 60px rgba(217, 119, 6, 0.4);
    }
    body.theme-zootopia h1 {
      color: #78350f;
    }
    body.theme-zootopia .flashcard {
      background: linear-gradient(145deg, #fffbeb, #fef3c7);
      box-shadow: 0 10px 30px rgba(180, 83, 9, 0.3);
    }
    body.theme-zootopia .problem {
      color: #92400e;
    }
    body.theme-zootopia .answer-input {
      border-color: #d97706;
      background: #fff;
    }
    body.theme-zootopia .btn {
      background: linear-gradient(90deg, #b45309, #fbbf24);
    }
    body.theme-zootopia .streak-text {
      color: #d97706;
    }
    
    .flashcard {
      background: linear-gradient(145deg, #ffffff, #f0f0f0);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 8px;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .problem {
      font-size: 3rem;
      color: #333;
      font-weight: bold;
      margin-bottom: 8px;
    }
    
    .answer-input {
      width: 120px;
      padding: 12px;
      border: 3px solid #667eea;
      border-radius: 12px;
      font-size: 1.5rem;
      text-align: center;
      outline: none;
    }
    
    .answer-input:focus {
      border-color: #764ba2;
    }
    
    .answer-input.correct {
      border-color: #10b981;
      background: #d1fae5;
    }
    
    .answer-input.wrong {
      border-color: #ef4444;
      background: #fee2e2;
    }
    
    .feedback {
      margin-top: 15px;
      font-size: 1.1rem;
      font-weight: 600;
      height: 25px;
    }
    
    .feedback.correct {
      color: #10b981;
    }
    
    .feedback.wrong {
      color: #ef4444;
    }
    
    .controls {
      display: flex;
      gap: 10px;
    }
    
    .btn-secondary {
      background: #e5e5e5;
      color: #333;
    }
    
    .btn-secondary:hover {
      background: #d5d5d5;
    }
    
    /* Results Screen */
    .results {
      text-align: center;
    }
    
    .results h2 {
      color: #333;
      margin-bottom: 10px;
    }
    
    .results .score {
      font-size: 4rem;
      font-weight: bold;
      color: #667eea;
      margin: 20px 0;
    }
    
    .results .stats {
      color: #666;
      margin-bottom: 30px;
    }
    
    .celebration {
      font-size: 3rem;
      margin-bottom: 8px;
      animation: celebrate 0.5s ease infinite alternate;
    }
    
    @keyframes celebrate {
      from { transform: rotate(-10deg) scale(1); }
      to { transform: rotate(10deg) scale(1.1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Setup Screen -->
    <div id="setup-screen" class="screen active">
      <h1>🧮 Math Facts Practice</h1>
      
      <div class="form-group">
        <label>Operation</label>
        <div class="checkbox-group">
          <label class="checkbox-item selected" data-op="addition">
            <input type="checkbox" checked> ➕ Addition
          </label>
          <label class="checkbox-item" data-op="subtraction">
            <input type="checkbox"> ➖ Subtraction
          </label>
        </div>
      </div>
      
      <div class="form-group">
        <label id="number-label">Numbers to Practice (+1 to +9)</label>
        <div class="number-select" id="number-select">
          <!-- Generated by JS -->
        </div>
      </div>
      
      <div class="form-group">
        <label>Goal (number of facts)</label>
        <input type="number" class="goal-input" id="goal-input" value="100" min="10" max="500">
      </div>
      
      <div class="form-group">
        <label>Theme</label>
        <select id="theme-select" class="goal-input" style="text-align: center;">
          <option value="default">🌈 Default</option>
          <option value="kpop">🖤 K-pop Demon Hunter</option>
          <option value="mcqueen">⚡ Lightning McQueen</option>
          <option value="ocean">🌊 Ocean</option>
          <option value="sunset">🌅 Sunset</option>
          <option value="frozen">❄️ Frozen</option>
          <option value="mario">🍄 Mario</option>
          <option value="zootopia">🦊 Zootopia</option>
        </select>
      </div>
      
      <button class="btn" onclick="startPractice()">Start Practice</button>
      
      <div style="margin-top: 20px; padding: 12px; background: #f5f5f5; border-radius: 10px; text-align: center;">
        <div style="font-size: 0.9rem; color: #666; margin-bottom: 8px;">📱 Add to Home Screen</div>
        <div style="font-size: 0.8rem; color: #888;">iPhone: Share → Add to Home Screen<br>Android: Menu → Add to Home Screen</div>
      </div>
    </div>
    
    <!-- Practice Screen -->
    <div id="practice-screen" class="screen">
      <div class="flashcard">
        <div class="progress-bar" style="width: 100%; margin-bottom: 10px;">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text" style="margin-bottom: 5px;">0 / 100</div>
        <div class="streak-text" id="streak-text"></div>
        
        <div id="milestone-badge" class="milestone-badge" style="display: none;"></div>
        
        <div class="problem" id="problem">5 + 3</div>
        <input type="number" class="answer-input" id="answer-input" placeholder="?" autocomplete="off">
        <div style="color: #888; font-size: 0.85rem; margin-top: 8px;">Press Enter to submit</div>
        <div class="feedback" id="feedback"></div>
      </div>
      
      <div class="controls">
        <button class="btn btn-secondary" onclick="endPractice()">End Practice</button>
      </div>
    </div>
    
    <!-- Results Screen -->
    <div id="results-screen" class="screen">
      <div class="results">
        <div class="celebration" id="celebration">🎉</div>
        <h2>Practice Complete!</h2>
        <div class="score" id="score">85%</div>
        <div class="stats" id="stats">85 correct out of 100</div>
        <button class="btn" onclick="resetPractice()">Practice Again</button>
      </div>
    </div>
  </div>

  <script>
    // State
    let selectedOperations = ['addition'];
    let selectedNumbers = [1, 2, 3, 4, 5, 6, 7, 8, 9];
    let goal = 100;
    let currentProblem = null;
    let correctCount = 0;
    let totalCount = 0;
    let lastMilestone = 0;
    let streak = 0;
    let bestStreak = 0;
    let selectedTheme = 'default';
    
    // Milestones
    const milestones = [20, 40, 60, 80, 100];
    const encouragement = {
      20: "Great start! 🌟",
      40: "You're on fire! 🔥",
      60: "Halfway there! 🚀",
      80: "Almost done! 💪",
      100: "AMAZING! 🎯"
    };
    
    // Generate number buttons (0-9 for subtraction, 1-9 for addition)
    const numberSelect = document.getElementById('number-select');
    for (let i = 0; i <= 9; i++) {
      const btn = document.createElement('button');
      // Default to 1-9 for both (subtraction uses 1-9, so max is 9+9=18)
      btn.className = 'number-btn' + (i >= 1 ? ' selected' : '');
      btn.textContent = i === 0 ? '0' : (selectedOperations.includes('subtraction') ? '-' + i : '+' + i);
      btn.onclick = () => toggleNumber(btn, i);
      numberSelect.appendChild(btn);
    }
    
    // Operation toggle - mutually exclusive (radio behavior)
    document.querySelectorAll('.checkbox-item[data-op]').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        
        // Get the operation being selected
        const op = item.dataset.op;
        
        // If clicking on already selected, don't deselect (keep at least one)
        if (item.classList.contains('selected') && document.querySelectorAll('.checkbox-item[data-op].selected').length === 1) {
          return;
        }
        
        // Deselect all operation checkboxes first
        document.querySelectorAll('.checkbox-item[data-op]').forEach(i => {
          i.classList.remove('selected');
          i.querySelector('input').checked = false;
        });
        
        // Select the clicked one
        item.classList.add('selected');
        item.querySelector('input').checked = true;
        selectedOperations = [op];
        
        // Update number label and button labels based on operation
        const hasSubtraction = selectedOperations.includes('subtraction');
        document.getElementById('number-label').textContent = hasSubtraction 
          ? 'Subtract (0-9, max 18)' 
          : 'Add (+1 to +9)';
        
        // Update button labels
        document.querySelectorAll('.number-btn').forEach((btn, idx) => {
          if (idx === 0) {
            btn.textContent = hasSubtraction ? '-0' : '+0';
          } else {
            btn.textContent = hasSubtraction ? '-' + idx : '+' + idx;
          }
        });
      });
    });
    
    // Theme selection from dropdown
    
    function toggleNumber(btn, num) {
      btn.classList.toggle('selected');
      if (selectedNumbers.includes(num)) {
        selectedNumbers = selectedNumbers.filter(n => n !== num);
      } else {
        selectedNumbers.push(num);
      }
      // Ensure at least one number
      if (selectedNumbers.length === 0) {
        selectedNumbers = [1];
        numberSelect.querySelector('.number-btn').classList.add('selected');
      }
    }
    
    function generateProblem() {
      const operation = selectedOperations[Math.floor(Math.random() * selectedOperations.length)];
      const num = selectedNumbers[Math.floor(Math.random() * selectedNumbers.length)];
      
      let a, b, answer;
      
      if (operation === 'addition') {
        // Addition: a + num (num is 1-9)
        a = Math.floor(Math.random() * 10) + 1;
        b = num;
        answer = a + b;
        currentProblem = { text: `${a} + ${b}`, answer };
      } else {
        // Subtraction: use positive value of num
        const absNum = Math.abs(num); // Convert -1 to 1, -2 to 2, etc.
        answer = Math.floor(Math.random() * 10); // 0-9
        a = answer + absNum; // e.g., 5 + 9 = 14, so 14 - 9 = 5
        b = absNum;
        currentProblem = { text: `${a} - ${b}`, answer };
      }
      
      document.getElementById('problem').textContent = currentProblem.text;
      
      // Set initial color
      const colorStage = Math.min(Math.floor(totalCount / 20) + 1, 5);
      const colors = {
        1: '#ef4444',  // red
        2: '#f59e0b',  // orange
        3: '#10b981',  // green
        4: '#3b82f6',  // blue
        5: '#8b5cf6'   // purple
      };
      document.getElementById('problem').style.color = colors[colorStage];
    }
    
    function checkAnswer() {
      const input = document.getElementById('answer-input');
      const feedback = document.getElementById('feedback');
      const userAnswer = parseInt(input.value);
      
      if (isNaN(userAnswer)) return;
      
      totalCount++;
      
      if (userAnswer === currentProblem.answer) {
        correctCount++;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        input.classList.add('correct');
        input.classList.remove('wrong');
        feedback.textContent = '✓ Correct!';
        feedback.className = 'feedback correct';
        
        // Show streak
        if (streak >= 3) {
          document.getElementById('streak-text').textContent = '🔥 ' + streak + ' streak!';
        }
      } else {
        streak = 0;
        document.getElementById('streak-text').textContent = '';
        input.classList.add('wrong');
        input.classList.remove('correct');
        feedback.textContent = `✗ Answer: ${currentProblem.answer}`;
        feedback.className = 'feedback wrong';
      }
      
      updateProgress();
      
      // Next problem after short delay
      setTimeout(() => {
        input.value = '';
        input.classList.remove('correct', 'wrong');
        feedback.textContent = '';
        
        if (totalCount >= goal) {
          showResults();
        } else {
          generateProblem();
          input.focus();
        }
      }, 1000);
    }
    
    function updateProgress() {
      const percent = (totalCount / goal) * 100;
      const progressFill = document.getElementById('progress-fill');
      progressFill.style.width = percent + '%';
      document.getElementById('progress-text').textContent = `${totalCount} / ${goal}`;
      
      // Change color every 20 facts (1=red, 2=orange, 3=green, 4=blue, 5=purple)
      const colorStage = Math.min(Math.floor(totalCount / 20) + 1, 5);
      
      // Apply color to progress bar
      progressFill.className = 'progress-fill color-' + colorStage;
      
      // Apply color to problem text
      const colors = {
        1: '#ef4444',  // red
        2: '#f59e0b',  // orange
        3: '#10b981',  // green
        4: '#3b82f6',  // blue
        5: '#8b5cf6'   // purple
      };
      document.getElementById('problem').style.color = colors[colorStage];
      
      // Check milestones
      milestones.forEach(m => {
        if (totalCount >= m && lastMilestone < m) {
          lastMilestone = m;
          showMilestone(m);
        }
      });
    }
    
    function showMilestone(m) {
      const badge = document.getElementById('milestone-badge');
      badge.textContent = encouragement[m];
      badge.style.display = 'inline-block';
      setTimeout(() => {
        badge.style.display = 'none';
      }, 2000);
    }
    
    function startPractice() {
      goal = parseInt(document.getElementById('goal-input').value) || 100;
      goal = Math.max(10, Math.min(500, goal));
      
      // Get selected theme from dropdown
      selectedTheme = document.getElementById('theme-select').value || 'default';
      
      // Apply theme to body
      document.body.className = selectedTheme === 'default' ? '' : 'theme-' + selectedTheme;
      
      selectedOperations = [];
      document.querySelectorAll('.checkbox-item[data-op].selected').forEach(item => {
        selectedOperations.push(item.dataset.op);
      });
      
      if (selectedOperations.length === 0) selectedOperations = ['addition'];
      
      selectedNumbers = [];
      document.querySelectorAll('.number-btn.selected').forEach(btn => {
        // Extract number from text like "+1" or "-3" - always convert to positive
        const num = Math.abs(parseInt(btn.textContent.replace(/[^0-9-]/g, '')));
        if (!isNaN(num)) selectedNumbers.push(num);
      });
      
      if (selectedNumbers.length === 0) selectedNumbers = [1, 2, 3, 4, 5, 6, 7, 8, 9];
      
      // Reset state
      correctCount = 0;
      totalCount = 0;
      lastMilestone = 0;
      streak = 0;
      bestStreak = 0;
      document.getElementById('streak-text').textContent = '';
      document.getElementById('progress-fill').className = 'progress-fill color-1';
      
      document.getElementById('setup-screen').classList.remove('active');
      document.getElementById('practice-screen').classList.add('active');
      
      updateProgress();
      generateProblem();
      document.getElementById('answer-input').focus();
    }
    
    function endPractice() {
      showResults();
    }
    
    function showResults() {
      document.getElementById('practice-screen').classList.remove('active');
      document.getElementById('results-screen').classList.add('active');
      
      const percent = Math.round((correctCount / totalCount) * 100);
      document.getElementById('score').textContent = percent + '%';
      document.getElementById('stats').textContent = `${correctCount} correct out of ${totalCount}` + (bestStreak > 0 ? ` | Best streak: ${bestStreak}` : '');
      
      // Celebration based on score
      const celebration = document.getElementById('celebration');
      if (percent >= 90) {
        celebration.textContent = '🏆';
      } else if (percent >= 70) {
        celebration.textContent = '🎉';
      } else {
        celebration.textContent = '👍';
      }
    }
    
    function resetPractice() {
      document.getElementById('results-screen').classList.remove('active');
      document.getElementById('setup-screen').classList.add('active');
      // Reset theme to default
      document.body.className = '';
      document.getElementById('theme-select').value = 'default';
    }
    
    // Enter key to submit
    document.getElementById('answer-input').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        checkAnswer();
      }
    });
  </script>
</body>
</html>
